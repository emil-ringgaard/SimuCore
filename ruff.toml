line-length = 150
indent-width = 4
target-version = "py314"  # Set to your minimum supported Python version

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes (undefined names, unused imports, etc.)
    "I",   # isort (import sorting)
    "B",   # flake8-bugbear (likely bugs & design issues)
    "C4",  # flake8-comprehensions (better list/dict/set comprehensions)
    "UP",  # pyupgrade (modernize syntax for your target Python version)
    "N",   # pep8-naming conventions
    "SIM", # flake8-simplify (simplifiable code patterns)
]
ignore = [
    "E501",  # Line too long — handled by the formatter instead
    "B008",  # Do not perform function calls in default arguments (common in FastAPI)
]

# Allow unused variables if they start with an underscore
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+_*))$"

[lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",  # Allow assert statements in tests
]
"simucore_pytest/core/application_tree.py" = [
    "N815"
]
"scripts/**" = [
    "ALL"
]
"__init__.py" = [
    "F401",  # Allow unused imports in __init__.py (re-exports)
]

[lint.isort]
known-first-party = ["simucore_pytest"]
force-sort-within-sections = true

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"