name: Run tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # JOB 1: Run linting and type checking only once (on Linux)
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check

      - name: Pyright
        run: uv run pyright

  # JOB 2: Run tests across all three operating systems
  test:
    name: Test on ${{ matrix.os }}
    needs: lint  # This ensures tests only run if linting passes first
    strategy:
      fail-fast: false  # If one OS fails, let the others finish
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Pytest
        run: uv run pytest